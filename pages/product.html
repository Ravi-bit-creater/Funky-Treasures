    </header>

    <main class="dynamic-product-page">
        <div class="product-breadcrumb" id="productBreadcrumb">
            <a href="../index.html">Home</a>
            <span>/</span>
            <a href="#" id="productCategoryLink">Category</a>
            <span>/</span>
            <span id="productBreadcrumbName">Product</span>
        </div>

        <div class="dynamic-product-layout">
            <div class="dynamic-product-image">
                <img id="productImage" src="" alt="Product Image">
            </div>

            <div class="dynamic-product-details">
                <h2 id="productName">Product Name</h2>
                <p class="dynamic-product-code" id="productCode">SKU</p>
                <p class="dynamic-product-price" id="productPrice">₹0.00</p>
                <p class="dynamic-product-stock">In Stock</p>
                <p class="dynamic-product-desc-short" id="productShortDesc"></p>

                <h4>Available Colors</h4>
                <div class="dynamic-color-options" id="productColors"></div>

                <h4>Select Size</h4>
                <div class="dynamic-sizes" id="productSizes"></div>

                <div class="product-action-section">
                    <div class="quantity-section">
                        <label>Quantity</label>
                        <div class="quantity-controls">
                            <button type="button" id="qtyMinus">−</button>
                            <input type="text" id="qtyInput" value="1" readonly>
                            <button type="button" id="qtyPlus">+</button>
                        </div>
                    </div>

                    <div class="action-row">
                        <a href="#" id="whatsappBtn" class="add-cart-btn" target="_blank">Enquiry on WhatsApp</a>

                        <button class="wishlist-btn" type="button" aria-label="Wishlist">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 20.5s-7-4.35-9.2-8.3C1.1 9.2 2.2 5.8 5.7 5.1c2-.4 3.9.4 5.1 2 1.2-1.6 3.1-2.4 5.1-2 3.5.7 4.6 4.1 2.9 7.1-2.2 3.95-9.2 8.3-9.2 8.3z"></path>
                            </svg>
                        </button>
                    </div>


                    <div class="product-info-box">
                        <h3>Product Details</h3>

                        <div class="info-row">
                            <span>Material:</span>
                            <strong id="productMaterial">satin</strong>
                        </div>
                    </div>

                    <div class="description-box">
                        <h3>Description</h3>
                        <p id="productDescription"></p>
                    </div>
                </div>
            </div>
        </div>

<!--         <section class="related-products-section">
            <h3>You Might Also Like</h3>
            <div class="related-products-grid" id="relatedProducts"></div>
        </section> -->
    </main>
